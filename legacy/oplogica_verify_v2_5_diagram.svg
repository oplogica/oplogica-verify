<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="1512" viewBox="0 0 680 756" role="img" font-family="-apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
<title>OpLogica Verify — OVA v2.5 architecture, final</title>
<desc>A structural diagram showing the trust chain of OpLogica Verify version 2.5, from the external pinned trust anchors through the signed governance registry, the five-layer proof bundle (PoN, PoE, PoO, PoR, PoC), to the independent verifier. Below the architecture, two boxes state explicitly what the system proves and what it does not prove.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<style>
.t  { font-size: 14px; font-weight: 400; fill: #2C2C2A; }
.ts { font-size: 12px; font-weight: 400; }
.th { font-size: 14px; font-weight: 500; }
.arr { stroke: #5F5E5A; stroke-width: 1; fill: none; }
.c-gray   .th { fill: #2C2C2A; } .c-gray   .ts { fill: #5F5E5A; } .c-gray   rect:not(.inner) { fill: #F1EFE8; stroke: #5F5E5A; }
.c-teal   .th { fill: #04342C; } .c-teal   .ts { fill: #0F6E56; } .c-teal   rect:not(.inner) { fill: #E1F5EE; stroke: #0F6E56; }
.c-purple .th { fill: #26215C; } .c-purple .ts { fill: #534AB7; } .c-purple rect:not(.inner) { fill: #EEEDFE; stroke: #534AB7; }
.c-blue   .th { fill: #042C53; } .c-blue   .ts { fill: #185FA5; } .c-blue   rect:not(.inner) { fill: #E6F1FB; stroke: #185FA5; }
.c-coral  .th { fill: #4A1B0C; } .c-coral  .ts { fill: #993C1D; } .c-coral  rect:not(.inner) { fill: #FAECE7; stroke: #993C1D; }
.c-green  .th { fill: #173404; } .c-green  .ts { fill: #3B6D11; } .c-green  rect:not(.inner) { fill: #EAF3DE; stroke: #3B6D11; }
</style>
</defs>

<rect x="0" y="0" width="680" height="756" fill="#FFFFFF"/>

<text class="th" x="340" y="32" text-anchor="middle" style="font-size:16px;">OpLogica Verify — OVA v2.5</text>
<text class="ts" x="340" y="50" text-anchor="middle" fill="#5F5E5A">Cryptographic governance-to-execution verification</text>

<g class="c-gray">
<rect x="40" y="78" width="180" height="86" rx="12" stroke-width="0.5"/>
<text class="th" x="130" y="100" text-anchor="middle">Trust anchors</text>
<text class="ts" x="130" y="120" text-anchor="middle">Pinned out-of-band</text>
<text class="ts" x="130" y="138" text-anchor="middle">Root public key</text>
<text class="ts" x="130" y="154" text-anchor="middle">Allowed registry hashes</text>
</g>

<g class="c-teal">
<rect x="250" y="78" width="200" height="86" rx="12" stroke-width="0.5"/>
<text class="th" x="350" y="100" text-anchor="middle">Governance registry</text>
<text class="ts" x="350" y="120" text-anchor="middle">Signed by trusted root</text>
<text class="ts" x="350" y="138" text-anchor="middle">Participant + operator keys</text>
<text class="ts" x="350" y="154" text-anchor="middle">Threshold, roles, epoch</text>
</g>

<g class="c-gray">
<rect x="480" y="78" width="160" height="86" rx="12" stroke-width="0.5"/>
<text class="th" x="560" y="100" text-anchor="middle">Temporal bounds</text>
<text class="ts" x="560" y="120" text-anchor="middle">valid_from</text>
<text class="ts" x="560" y="138" text-anchor="middle">valid_until</text>
<text class="ts" x="560" y="154" text-anchor="middle">Enforced per decision</text>
</g>

<line x1="220" y1="121" x2="248" y2="121" class="arr" marker-end="url(#arrow)"/>
<line x1="450" y1="121" x2="478" y2="121" class="arr" marker-end="url(#arrow)"/>

<g class="c-purple">
<rect x="40" y="200" width="600" height="300" rx="14" stroke-width="0.5"/>
<text class="th" x="340" y="224" text-anchor="middle">Proof bundle</text>
<text class="ts" x="340" y="242" text-anchor="middle">Five layers, Merkle root, content-bound signatures</text>
</g>

<g class="c-blue">
<rect x="60" y="262" width="180" height="92" rx="10" stroke-width="0.5"/>
<text class="th" x="150" y="284" text-anchor="middle">PoN</text>
<text class="ts" x="150" y="302" text-anchor="middle">Proof of negotiation</text>
<text class="ts" x="150" y="320" text-anchor="middle">Signed votes</text>
<text class="ts" x="150" y="338" text-anchor="middle">Bound to policy_hash</text>
</g>

<g class="c-blue">
<rect x="250" y="262" width="180" height="92" rx="10" stroke-width="0.5"/>
<text class="th" x="340" y="284" text-anchor="middle">PoE</text>
<text class="ts" x="340" y="302" text-anchor="middle">Proof of evolution</text>
<text class="ts" x="340" y="320" text-anchor="middle">Constraint version chain</text>
<text class="ts" x="340" y="338" text-anchor="middle">Per-version policy_hash</text>
</g>

<g class="c-coral">
<rect x="440" y="262" width="180" height="92" rx="10" stroke-width="0.5"/>
<text class="th" x="530" y="284" text-anchor="middle">PoO</text>
<text class="ts" x="530" y="302" text-anchor="middle">Proof of operation</text>
<text class="ts" x="530" y="320" text-anchor="middle">Signed by operator</text>
<text class="ts" x="530" y="338" text-anchor="middle">Binds active policy_hash</text>
</g>

<g class="c-coral">
<rect x="60" y="378" width="270" height="108" rx="10" stroke-width="0.5"/>
<text class="th" x="195" y="400" text-anchor="middle">PoR</text>
<text class="ts" x="195" y="418" text-anchor="middle">Proof of reasoning provenance</text>
<text class="ts" x="195" y="436" text-anchor="middle">DAG + reachability</text>
<text class="ts" x="195" y="454" text-anchor="middle">Cross-layer anchor to PoO</text>
<text class="ts" x="195" y="472" text-anchor="middle">Per-rule constraint_hash · provenance only</text>
</g>

<g class="c-coral">
<rect x="350" y="378" width="270" height="108" rx="10" stroke-width="0.5"/>
<text class="th" x="485" y="400" text-anchor="middle">PoC</text>
<text class="ts" x="485" y="418" text-anchor="middle">Proof of conflict</text>
<text class="ts" x="485" y="436" text-anchor="middle">Resolution protocols</text>
<text class="ts" x="485" y="454" text-anchor="middle">Declared conflicts only</text>
<text class="ts" x="485" y="472" text-anchor="middle">Silent omission disclosed</text>
</g>

<line x1="350" y1="164" x2="350" y2="198" class="arr" marker-end="url(#arrow)"/>

<g class="c-green">
<rect x="40" y="528" width="600" height="98" rx="12" stroke-width="0.5"/>
<text class="th" x="340" y="552" text-anchor="middle">Independent verifier</text>
<text class="ts" x="340" y="572" text-anchor="middle">Recomputes 13 checks from primitives — never trusts bundle flags</text>
<text class="ts" x="340" y="590" text-anchor="middle">20 malicious-generator tests passed</text>
<text class="ts" x="340" y="608" text-anchor="middle">Result: VALID or INVALID, with per-check diagnostics</text>
</g>

<line x1="340" y1="500" x2="340" y2="526" class="arr" marker-end="url(#arrow)"/>

<g class="c-teal">
<rect x="40" y="646" width="300" height="96" rx="10" stroke-width="0.5"/>
<text class="th" x="190" y="668" text-anchor="middle">What is proven</text>
<text class="ts" x="190" y="690" text-anchor="middle">Tamper-evident bundle integrity</text>
<text class="ts" x="190" y="708" text-anchor="middle">Consensus binds to active policy_hash</text>
<text class="ts" x="190" y="726" text-anchor="middle">Rule provenance via constraint_hash</text>
</g>

<g class="c-gray">
<rect x="350" y="646" width="290" height="96" rx="10" stroke-width="0.5"/>
<text class="th" x="495" y="668" text-anchor="middle">What is not proven</text>
<text class="ts" x="495" y="686" text-anchor="middle">Formal semantic entailment</text>
<text class="ts" x="495" y="702" text-anchor="middle">Ethical or clinical correctness</text>
<text class="ts" x="495" y="718" text-anchor="middle">Full conflict completeness</text>
<text class="ts" x="495" y="734" text-anchor="middle">Key revocation / production PKI</text>
</g>
</svg>
